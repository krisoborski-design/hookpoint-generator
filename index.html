<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hookpoint Generator</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #7c5cbf;
    --accent2: #5b8def;
    --green: #3a9e6a;
    --red: #e05555;
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 12px; color: var(--muted); }

  .layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 61px); }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .search-wrap { padding: 12px; border-bottom: 1px solid var(--border); }
  .search-wrap input {
    width: 100%;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
  }
  .search-wrap input:focus { outline: none; border-color: var(--accent2); }

  .cats { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .cat-btn {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
  }
  .cat-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(91,141,239,0.1); }

  .hook-list { flex: 1; overflow-y: auto; padding: 8px; }
  .hook-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
    transition: all 0.12s;
  }
  .hook-item:hover { background: var(--surface); }
  .hook-item.selected { background: rgba(91,141,239,0.08); border-color: var(--accent2); }
  .hook-cat { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; text-transform: uppercase; }
  .hook-text { font-size: 12px; color: var(--text); line-height: 1.5; }

  .pagination { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--muted); }
  .pagination button {
    padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
  }
  .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
  .pagination button:not(:disabled):hover { border-color: var(--accent2); color: var(--accent2); }

  /* MAIN */
  .main { display: flex; flex-direction: column; overflow: hidden; }

  .selected-panel {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    min-height: 160px;
  }
  .selected-panel.empty { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; }
  .sel-cat { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; }
  .sel-text { font-size: 16px; line-height: 1.7; color: var(--text); margin-bottom: 18px; }
  .sel-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-copy { background: var(--accent2); color: #fff; }
  .btn-copy:hover { background: #4a7de0; }
  .btn-copy.copied { background: var(--green); }
  .btn-generate { background: var(--accent); color: #fff; }
  .btn-generate:hover { background: #6a4aaf; }
  .btn-link { background: var(--surface2); color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn-link:hover { color: var(--text); }

  /* GENERATOR */
  .generator { flex: 1; overflow-y: auto; padding: 24px; }
  .gen-title { font-size: 14px; font-weight: 500; margin-bottom: 16px; color: var(--muted); }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent2); background: rgba(91,141,239,0.05); }
  .upload-zone.has-img { border-color: var(--green); border-style: solid; }
  .upload-zone img { max-height: 180px; max-width: 100%; border-radius: 8px; object-fit: cover; }
  .upload-zone p { color: var(--muted); font-size: 14px; margin-top: 8px; }
  .upload-zone small { color: var(--muted); font-size: 12px; }

  .gen-info {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .gen-info span strong { color: var(--text); }

  .btn-gen-main {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-gen-main:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-gen-main:not(:disabled):hover { opacity: 0.9; }

  .log-box {
    margin-top: 16px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    font-family: monospace;
    font-size: 12px;
    max-height: 180px;
    overflow-y: auto;
    display: none;
  }
  .log-box.visible { display: block; }
  .log-line { padding: 2px 0; color: var(--muted); }
  .log-line.ok { color: var(--green); }
  .log-line.err { color: var(--red); }

  .result-box {
    margin-top: 20px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .result-box.visible { display: flex; }
  .result-box video { max-width: 240px; border-radius: 12px; border: 1px solid var(--border); }
  .result-box .btn-dl {
    padding: 10px 24px; background: var(--green); color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 500;
    cursor: pointer; text-decoration: none;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>🎬 Hookpoint Generator</h1>
  <span id="count-label">255 hooków w bazie</span>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Szukaj hooka...">
    </div>
    <div class="cats" id="cats"></div>
    <div class="hook-list" id="hook-list"></div>
    <div class="pagination">
      <button id="prev-btn" onclick="changePage(-1)">← Poprz</button>
      <span id="page-info"></span>
      <button id="next-btn" onclick="changePage(1)">Nast →</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="selected-panel empty" id="selected-panel">
      ← Wybierz hook z listy
    </div>

    <div class="generator" id="generator-section">
      <p class="gen-title">Generator wideo — Higgsfield Kling 3.0</p>

      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <div id="upload-inner">
          <p style="font-size:28px">📸</p>
          <p>Kliknij lub przeciągnij zdjęcie portretowe</p>
          <small>JPG, PNG, WEBP · min. 512×512px</small>
        </div>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handlePhoto(event)">

      <div class="gen-info" id="gen-info" style="display:none">
        <span>Hook: <strong id="info-hook">—</strong></span>
        <span>Model: <strong>Kling 3.0</strong></span>
        <span>Format: <strong>9:16</strong></span>
        <span>Czas: <strong>5s</strong></span>
      </div>

      <button class="btn-gen-main" id="gen-btn" disabled onclick="generate()">
        🚀 Generuj hookpoint przez Higgsfield
      </button>

      <div class="log-box" id="log-box"></div>
      <div class="result-box" id="result-box"></div>
    </div>
  </main>
</div>

const CAT_COLORS = {
  "EDUCATIONAL": "#5b8def",
  "STORYTELLING": "#9b6fe0",
  "MYTH BUSTING": "#e07a5f",
  "COMPARISON": "#3a9e6a",
  "AUTHORITY": "#d4a017",
  "DAY IN THE LIFE": "#e07aac",
  "RANDOM": "#6ab0d4"
};

const PER_PAGE = 20;
let state = { cat: "ALL", search: "", page: 0, selected: null, photo: null, photoFile: null, generating: false };

function filtered() {
  return DB.filter(h => {
    const mc = state.cat === "ALL" || h.c === state.cat;
    const q = state.search.toLowerCase();
    const mq = !q || h.t.toLowerCase().includes(q);
    return mc && mq;
  });
}

function renderCats() {
  const cats = ["ALL", ...Object.keys(CAT_COLORS)];
  const counts = {};
  DB.forEach(h => counts[h.c] = (counts[h.c] || 0) + 1);
  document.getElementById("cats").innerHTML = cats.map(c => {
    const n = c === "ALL" ? DB.length : (counts[c] || 0);
    return `<button class="cat-btn ${state.cat === c ? "active" : ""}" onclick="setCat('${c}')">${c === "ALL" ? "Wszystkie" : c.split(" ").map(w => w[0]).join("")} (${n})</button>`;
  }).join("");
}

function renderList() {
  const list = filtered();
  const total = list.length;
  const maxPage = Math.max(0, Math.ceil(total / PER_PAGE) - 1);
  if (state.page > maxPage) state.page = 0;
  const paged = list.slice(state.page * PER_PAGE, (state.page + 1) * PER_PAGE);

  document.getElementById("hook-list").innerHTML = paged.map(h => {
    const col = CAT_COLORS[h.c] || "#888";
    const sel = state.selected && state.selected.id === h.id;
    return `<div class="hook-item ${sel ? "selected" : ""}" onclick="selectHook(${h.id})">
      <div class="hook-cat" style="color:${col}">${h.c}</div>
      <div class="hook-text">${h.t}</div>
    </div>`;
  }).join("");

  document.getElementById("page-info").textContent = `${state.page + 1} / ${maxPage + 1} (${total})`;
  document.getElementById("prev-btn").disabled = state.page === 0;
  document.getElementById("next-btn").disabled = state.page >= maxPage;
}

function renderSelected() {
  const panel = document.getElementById("selected-panel");
  const infoBox = document.getElementById("gen-info");
  const genBtn = document.getElementById("gen-btn");

  if (!state.selected) {
    panel.innerHTML = "← Wybierz hook z listy";
    panel.className = "selected-panel empty";
    infoBox.style.display = "none";
    return;
  }

  const h = state.selected;
  const col = CAT_COLORS[h.c] || "#888";
  panel.className = "selected-panel";
  panel.innerHTML = `
    <div class="sel-cat" style="color:${col}">${h.c}</div>
    <div class="sel-text">${h.t}</div>
    <div class="sel-actions">
      <button class="btn btn-copy" id="copy-btn" onclick="copyHook()">📋 Kopiuj hook</button>
      <button class="btn btn-generate" onclick="scrollToGen()">🎬 Generuj wideo ↓</button>
    </div>
  `;

  infoBox.style.display = "flex";
  document.getElementById("info-hook").textContent = h.c + " #" + h.id;
  updateGenBtn();
}

function updateGenBtn() {
  const btn = document.getElementById("gen-btn");
  btn.disabled = !state.selected || !state.photo || state.generating;
}

function scrollToGen() {
  document.getElementById("generator-section").scrollIntoView({ behavior: "smooth" });
}

function selectHook(id) {
  state.selected = DB.find(h => h.id === id);
  renderList();
  renderSelected();
}

function setCat(c) {
  state.cat = c;
  state.page = 0;
  renderList();
  renderCats();
}

function changePage(d) {
  state.page += d;
  renderList();
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  state.photoFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    state.photo = ev.target.result;
    const zone = document.getElementById("upload-zone");
    zone.className = "upload-zone has-img";
    document.getElementById("upload-inner").innerHTML =
      `<img src="${state.photo}" alt="Podgląd"><p style="color:var(--green);font-size:12px;margin-top:8px">✓ Zdjęcie gotowe</p>`;
    updateGenBtn();
  };
  reader.readAsDataURL(file);
}

// Drag & Drop
const zone = document.getElementById("upload-zone");
zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("dragover"); });
zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
zone.addEventListener("drop", e => {
  e.preventDefault();
  zone.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith("image/")) {
    document.getElementById("file-input").files = e.dataTransfer.files;
    handlePhoto({ target: { files: [file] } });
  }
});

function copyHook() {
  if (!state.selected) return;
  navigator.clipboard.writeText(state.selected.t).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "✓ Skopiowano!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "📋 Kopiuj hook"; btn.classList.remove("copied"); }, 2000);
  });
}

function addLog(msg, type = "") {
  const box = document.getElementById("log-box");
  box.classList.add("visible");
  const line = document.createElement("div");
  line.className = "log-line " + type;
  line.textContent = msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function clearLog() {
  const box = document.getElementById("log-box");
  box.innerHTML = "";
  box.classList.remove("visible");
}

async function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function generate() {
  if (!state.selected || !state.photo || state.generating) return;
  state.generating = true;
  clearLog();
  document.getElementById("result-box").className = "result-box";
  document.getElementById("gen-btn").disabled = true;
  document.getElementById("gen-btn").textContent = "⏳ Generowanie...";

  try {
    addLog("📤 Przesyłanie zdjęcia do Higgsfield...");
    const imageBase64 = await toBase64(state.photoFile);

    const uploadResp = await fetch("/.netlify/functions/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "upload",
        image: imageBase64,
        mimeType: state.photoFile.type
      })
    });
    const uploadData = await uploadResp.json();
    if (!uploadData.media_id) throw new Error(uploadData.error || "Upload failed");
    addLog("✅ Zdjęcie przesłane (ID: " + uploadData.media_id.substring(0, 8) + "...)", "ok");

    addLog("🎬 Generowanie wideo Kling 3.0 — hook: " + state.selected.c);
    const genResp = await fetch("/.netlify/functions/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "generate",
        media_id: uploadData.media_id,
        media_url: uploadData.url,
        hook_text: state.selected.t,
        hook_category: state.selected.c
      })
    });
    const genData = await genResp.json();
    if (!genData.job_id) throw new Error(genData.error || "Generate failed");
    addLog("⏳ Zadanie uruchomione (ID: " + genData.job_id.substring(0, 8) + "...)");

    addLog("🔄 Oczekiwanie na wideo...");
    let videoUrl = null;
    for (let i = 0; i < 25; i++) {
      await new Promise(r => setTimeout(r, 8000));
      const pollResp = await fetch("/.netlify/functions/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "poll", job_id: genData.job_id })
      });
      const pollData = await pollResp.json();
      addLog("  → status: " + (pollData.status || "checking") + " (" + (i + 1) + "/25)");
      if (pollData.video_url) { videoUrl = pollData.video_url; break; }
      if (pollData.status === "failed") throw new Error("Generowanie nie powiodło się");
    }

    if (!videoUrl) throw new Error("Timeout — sprawdź historię w Higgsfield");

    addLog("🎉 Hookpoint gotowy!", "ok");
    const resultBox = document.getElementById("result-box");
    resultBox.className = "result-box visible";
    resultBox.innerHTML = `
      <video src="${videoUrl}" controls autoplay loop style="max-width:240px;border-radius:12px;border:1px solid var(--border)"></video>
      <a href="${videoUrl}" download="hookpoint-${state.selected.id}.mp4" class="btn-dl">⬇ Pobierz hookpoint</a>
    `;
  } catch (err) {
    addLog("❌ Błąd: " + err.message, "err");
  } finally {
    state.generating = false;
    document.getElementById("gen-btn").disabled = false;
    document.getElementById("gen-btn").textContent = "🚀 Generuj hookpoint przez Higgsfield";
    updateGenBtn();
  }
}

// Search
document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  state.page = 0;
  renderList();
});

// Init
renderCats();
renderList();
renderSelected();
</script>
</body>
</html>
